<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIELD SCAN - بوابة العبور</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #10b981; --bg: #020617; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }

        .scan-frame { position: relative; width: 85vw; max-width: 400px; height: 85vw; max-height: 400px; border-radius: 30px; border: 2px solid var(--primary); overflow: hidden; box-shadow: 0 0 50px rgba(16, 185, 129, 0.3); }
        #reader { width: 100%; height: 100%; object-fit: cover; }
        
        /* تأثير الليزر المتحرك */
        .laser { position: absolute; top: 0; width: 100%; height: 4px; background: var(--primary); box-shadow: 0 0 20px var(--primary); animation: move 2.5s infinite linear; z-index: 5; }
        @keyframes move { 0% { top: 0; } 100% { top: 100%; } }

        /* أزرار التحكم */
        .controls { margin-top: 30px; display: flex; gap: 15px; }
        .btn-action { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; backdrop-filter: blur(10px); }

        /* شاشة النجاح المبهرة */
        .status-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; animation: fadeIn 0.3s; }
        .status-card { text-align: center; transform: scale(0.8); animation: pop 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .status-card .icon { font-size: 6rem; margin-bottom: 20px; }
        .status-card h1 { font-size: 2.5rem; color: var(--primary); margin: 0; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pop { to { transform: scale(1); } }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="margin:0; letter-spacing: 2px;">SHIELD <span style="color:var(--primary)">SCANNER</span></h2>
        <p style="color: #64748b;">نظام التحقق من الهوية الرقمية</p>
    </div>

    <div class="scan-frame">
        <div id="reader"></div>
        <div class="laser"></div>
    </div>

    <div class="controls">
        <button class="btn-action" onclick="switchCamera()">🔄 قلب الكاميرا</button>
    </div>

    <div class="status-overlay" id="statusOverlay">
        <div class="status-card" id="statusCard">
            <div class="icon" id="statusIcon">✅</div>
            <h1 id="statusTitle">تم التأكيد</h1>
            <p id="statusName" style="font-size: 1.5rem; color: #cbd5e1; margin-top: 10px;"></p>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCgZgpQHl1aJcbtIe8otscDfA_Plzl7n_c", authDomain: "test-b8f87.firebaseapp.com", databaseURL: "https://test-b8f87-default-rtdb.firebaseio.com", projectId: "test-b8f87", storageBucket: "test-b8f87.firebasestorage.app", messagingSenderId: "199270761575", appId: "1:199270761575:web:fdb307007a678a498680c2" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let html5QrCode = new Html5Qrcode("reader");
        let currentFacingMode = "environment"; // الكاميرا الخلفية افتراضياً
        let isProcessing = false;

        const startScanner = (mode) => {
            html5QrCode.start({ facingMode: mode }, { fps: 15, qrbox: 250 }, onScanSuccess);
        };

        function onScanSuccess(decodedText) {
            if(isProcessing) return;
            isProcessing = true;

            db.ref('shield_guests/' + decodedText).once('value').then(snap => {
                if(snap.exists()){
                    const user = snap.val();
                    if(user.attended) {
                        showOverlay("⚠️", "مسجل مسبقاً", user.name, "#f59e0b");
                    } else {
                        db.ref('shield_guests/' + decodedText).update({ attended: true });
                        showOverlay("✅", "أهلاً بك", user.name, "#10b981");
                    }
                } else {
                    showOverlay("❌", "غير مسجل", "بطاقة غير صالحة", "#ef4444");
                }
            });
        }

        function showOverlay(icon, title, name, color) {
            const overlay = document.getElementById('statusOverlay');
            document.getElementById('statusIcon').innerText = icon;
            document.getElementById('statusTitle').innerText = title;
            document.getElementById('statusTitle').style.color = color;
            document.getElementById('statusName').innerText = name;
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; isProcessing = false; }, 3000);
        }

        function switchCamera() {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            html5QrCode.stop().then(() => startScanner(currentFacingMode));
        }

        startScanner(currentFacingMode);
    </script>
</body>
</html>
