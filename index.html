<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIELD DZ - نظام التحقق الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        /* هوية SHIELD DZ البصرية المعتمدة */
        :root { 
            --shield-blue: #0ea5e9; 
            --shield-dark: #0f172a; 
            --shield-light: #e0f2fe;
            --success: #10b981; 
            --danger: #ef4444; 
            --warning: #f59e0b; 
            --glass-bg: rgba(15, 23, 42, 0.75);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #020617;
            background-image: radial-gradient(circle at top right, rgba(14, 165, 233, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1), transparent 40%);
            color: white; 
            margin: 0; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        /* رأس الصفحة المؤسساتي (Header) */
        .header { 
            position: absolute; 
            top: 5vh; 
            text-align: center; 
            z-index: 10; 
            width: 100%; 
            padding: 0 20px;
        }
        .header h1 { 
            margin: 0; 
            font-size: 2.5rem; 
            font-weight: 900; 
            letter-spacing: 2px; 
            color: white;
            text-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
        }
        .header h1 span { color: var(--shield-blue); }
        .header p {
            color: #94a3b8;
            margin: 5px 0 0 0;
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* حاوية الماسح المتجاوبة (Responsive Scanner) */
        .scanner-container {
            position: relative;
            width: 90vw;
            max-width: 450px; /* حجم مثالي للحاسوب والهاتف */
            height: 90vw;
            max-height: 450px;
            background: var(--glass-bg);
            border-radius: 24px;
            border: 1px solid rgba(14, 165, 233, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(14, 165, 233, 0.15);
            backdrop-filter: blur(12px);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        #reader { width: 100%; height: 100%; border-radius: 24px; }
        #reader video { object-fit: cover !important; border-radius: 24px; }

        /* لمسة التصميم الفخمة (Corner Brackets) */
        .corner { position: absolute; width: 40px; height: 40px; border: 4px solid var(--shield-blue); z-index: 5; transition: all 0.3s ease; border-radius: 8px; }
        .corner.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .corner.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        /* خط الليزر الاحترافي */
        .scan-line {
            position: absolute;
            top: 10%;
            left: 5%;
            width: 90%;
            height: 2px;
            background: var(--shield-blue);
            box-shadow: 0 0 15px 2px var(--shield-blue);
            animation: scan 2.5s infinite alternate ease-in-out;
            z-index: 6;
            display: none;
            border-radius: 50%;
        }
        @keyframes scan {
            0% { top: 10%; opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }

        /* رسالة الكاميرا المغلقة */
        .camera-off-state {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #64748b;
        }
        .camera-off-state svg { width: 64px; height: 64px; margin-bottom: 15px; opacity: 0.5; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;}

        /* أزرار التحكم الأنيقة */
        .control-panel {
            margin-top: 35px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }
        .btn-control {
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px 30px;
            border-radius: 16px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn-control:hover { background: rgba(30, 41, 59, 0.9); transform: translateY(-2px); border-color: var(--shield-blue); }
        .btn-control.active-cam { border-color: var(--danger); color: #fca5a5; }

        /* شاشة التأكيد المؤسساتية (Enterprise Modal) */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 100;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.show { opacity: 1; }
        
        .result-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            transform: translateY(30px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .modal-overlay.show .result-card { transform: translateY(0) scale(1); }

        .result-icon {
            width: 90px; height: 90px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px auto; font-size: 3rem;
            background: rgba(255,255,255,0.05);
            border: 3px solid transparent;
        }
        
        .result-status { font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
        .result-name { font-size: 2.2rem; font-weight: 900; color: white; margin: 0 0 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px;}
        .result-time { background: rgba(0,0,0,0.3); padding: 8px 20px; border-radius: 12px; font-size: 1rem; color: #94a3b8; display: inline-block; }

        /* التوقيع الملكي أسفل الصفحة */
        .footer-branding {
            position: fixed; bottom: 20px; width: 100%; text-align: center; z-index: 10;
        }
        .footer-branding p { margin: 0; font-size: 0.95rem; color: #64748b; font-weight: 500;}
        .footer-branding span { font-weight: 900; }
        .team-name { color: var(--shield-blue); }
        .leader-name { color: var(--shield-light); }
        
        /* إخفاء إشعارات المكتبة المزعجة */
        #html5-qrcode-anchor-scan-type-change { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SHIELD <span>DZ</span></h1>
        <p>نظام الدخول الآمن للفعاليات</p>
    </div>

    <div class="scanner-container">
        <div class="corner tl" id="c1"></div>
        <div class="corner tr" id="c2"></div>
        <div class="corner bl" id="c3"></div>
        <div class="corner br" id="c4"></div>
        
        <div class="camera-off-state" id="cameraOffMsg">
            <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <span>النظام في وضع الاستعداد</span>
        </div>

        <div id="reader"></div>
        <div class="scan-line" id="laserLine"></div>
    </div>

    <div class="control-panel">
        <button class="btn-control" id="btnToggle" onclick="toggleScanner()">
            <span id="toggleIcon">▶️</span> <span id="toggleText">تشغيل الماسح</span>
        </button>
        <button class="btn-control" onclick="switchCamera()">
            <span>🔄</span> تبديل الكاميرا
        </button>
    </div>

    <div class="modal-overlay" id="resultModal">
        <div class="result-card" id="resultCard">
            <div class="result-icon" id="resIcon"></div>
            <div class="result-status" id="resStatus">STATUS</div>
            <h2 class="result-name" id="resName">اسم الضيف</h2>
            <div class="result-time" id="resTime">00:00</div>
        </div>
    </div>

    <div class="footer-branding">
        <p>تم التطوير والبرمجة بواسطة <span class="team-name">فريق طموح</span></p>
        <p>بالتعاون مع <span class="leader-name">قائدة المشروع</span></p>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCgZgpQHl1aJcbtIe8otscDfA_Plzl7n_c", authDomain: "test-b8f87.firebaseapp.com", databaseURL: "https://test-b8f87-default-rtdb.firebaseio.com", projectId: "test-b8f87", storageBucket: "test-b8f87.firebasestorage.app", messagingSenderId: "199270761575", appId: "1:199270761575:web:fdb307007a678a498680c2" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let html5QrCode;
        let isScanning = false;
        let isProcessing = false;
        let currentFacingMode = "environment"; // الكاميرا الخلفية كخيار أول

        function initScanner() {
            if(!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        }

        async function toggleScanner() {
            if(isProcessing) return;
            initScanner();
            const btn = document.getElementById('btnToggle');
            const icon = document.getElementById('toggleIcon');
            const text = document.getElementById('toggleText');

            if (isScanning) {
                // إيقاف
                await html5QrCode.stop();
                isScanning = false;
                setUIState('off');
                btn.classList.remove('active-cam');
                icon.innerText = "▶️";
                text.innerText = "تشغيل الماسح";
            } else {
                // تشغيل متقدم يدعم الحواسيب والهواتف
                try {
                    setUIState('loading');
                    // المحاولة الأولى: الكاميرا الخلفية
                    await html5QrCode.start({ facingMode: currentFacingMode }, { fps: 15, qrbox: { width: 250, height: 250 } }, handleScan);
                    scanStarted(btn, icon, text);
                } catch(err) {
                    // إذا كان حاسوباً وليس له كاميرا خلفية، نفتح الكاميرا المتوفرة مباشرة
                    try {
                        console.log("التبديل للكاميرا المتوفرة...", err);
                        await html5QrCode.start({ facingMode: "user" }, { fps: 15, qrbox: { width: 250, height: 250 } }, handleScan);
                        currentFacingMode = "user";
                        scanStarted(btn, icon, text);
                    } catch(fallbackErr) {
                        alert("يرجى التأكد من صلاحيات الكاميرا في المتصفح.");
                        setUIState('off');
                    }
                }
            }
        }

        function scanStarted(btn, icon, text) {
            isScanning = true;
            setUIState('on');
            btn.classList.add('active-cam');
            icon.innerText = "⏹️";
            text.innerText = "إيقاف الماسح";
        }

        async function switchCamera() {
            if (!isScanning || isProcessing) return;
            isProcessing = true;
            await html5QrCode.stop();
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            try {
                await html5QrCode.start({ facingMode: currentFacingMode }, { fps: 15, qrbox: { width: 250, height: 250 } }, handleScan);
            } catch(e) {
                // تراجع إذا لم توجد كاميرا أخرى
                currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
                await html5QrCode.start({ facingMode: currentFacingMode }, { fps: 15, qrbox: { width: 250, height: 250 } }, handleScan);
            }
            isProcessing = false;
        }

        function setUIState(state) {
            const msg = document.getElementById('cameraOffMsg');
            const laser = document.getElementById('laserLine');
            const corners = document.querySelectorAll('.corner');
            
            if (state === 'on') {
                msg.style.display = 'none';
                laser.style.display = 'block';
                corners.forEach(c => c.style.borderColor = 'var(--shield-blue)');
            } else if (state === 'off') {
                msg.style.display = 'flex';
                laser.style.display = 'none';
                corners.forEach(c => c.style.borderColor = '#475569');
            }
        }

        function handleScan(decodedText) {
            if(isProcessing) return;
            isProcessing = true;
            
            // إيقاف مؤقت ذكي
            html5QrCode.pause();
            document.getElementById('laserLine').style.display = "none";

            db.ref('shield_guests/' + decodedText).once('value').then(snap => {
                if(snap.exists()){
                    const user = snap.val();
                    if(user.attended) {
                        showEnterpriseResult("⚠️", "تم تسجيل الدخول مسبقاً", user.name, "var(--warning)");
                    } else {
                        const timeNow = new Date().toLocaleTimeString('ar-DZ', {hour: '2-digit', minute:'2-digit'});
                        db.ref('shield_guests/' + decodedText).update({ attended: true, scanTime: timeNow });
                        showEnterpriseResult("✓", "دخول مصرح به", user.name, "var(--success)");
                    }
                } else {
                    showEnterpriseResult("✕", "تصريح غير صالح", "غير مسجل بالنظام", "var(--danger)");
                }
            });
        }

        function showEnterpriseResult(icon, status, name, color) {
            const modal = document.getElementById('resultModal');
            const card = document.getElementById('resultCard');
            const iconEl = document.getElementById('resIcon');
            
            iconEl.innerText = icon;
            iconEl.style.color = color;
            iconEl.style.borderColor = color;
            iconEl.style.boxShadow = `0 0 20px ${color}40`;
            
            document.getElementById('resStatus').innerText = status;
            document.getElementById('resStatus').style.color = color;
            
            document.getElementById('resName').innerText = name;
            
            const now = new Date();
            document.getElementById('resTime').innerText = 'وقت التسجيل: ' + now.toLocaleTimeString('ar-DZ', {hour: '2-digit', minute:'2-digit'});
            
            card.style.borderTop = `4px solid ${color}`;

            modal.style.display = 'flex';
            // Trigger animation
            setTimeout(() => modal.classList.add('show'), 10);
            
            // Auto close
            setTimeout(() => { 
                modal.classList.remove('show');
                setTimeout(() => { 
                    modal.style.display = 'none'; 
                    isProcessing = false;
                    if(isScanning) {
                        html5QrCode.resume();
                        document.getElementById('laserLine').style.display = "block";
                    }
                }, 300); 
            }, 3000);
        }
    </script>
</body>
</html>
