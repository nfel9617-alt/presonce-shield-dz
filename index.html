<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHIELD DZ - البوابة الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --primary: #7cb342; /* لون الأجنحة الأخضر */
            --bg: #0b1320; /* لون الخلفية الكحلي */
            --danger: #ef4444; 
            --warning: #f59e0b; 
            --glass-bg: rgba(11, 19, 32, 0.85);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); color: white; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .header { position: absolute; top: 5vh; text-align: center; z-index: 10; width: 100%; padding: 0 20px; }
        .header h1 { margin: 0; font-size: 2.5rem; font-weight: 900; letter-spacing: 2px; color: white; font-family: serif; text-shadow: 0 4px 15px rgba(124, 179, 66, 0.2); }
        .header p { color: var(--primary); margin: 5px 0 0 0; font-size: 1.1rem; font-weight: 500; }

        .scanner-container { position: relative; width: 90vw; max-width: 450px; height: 90vw; max-height: 450px; background: var(--glass-bg); border-radius: 24px; border: 1px solid rgba(124, 179, 66, 0.3); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(124, 179, 66, 0.1); overflow: hidden; display: flex; align-items: center; justify-content: center; margin-top: 20px; }
        #reader { width: 100%; height: 100%; border-radius: 24px; }
        #reader video { object-fit: cover !important; border-radius: 24px; }

        .corner { position: absolute; width: 40px; height: 40px; border: 4px solid var(--primary); z-index: 5; transition: all 0.3s ease; border-radius: 8px; }
        .corner.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .corner.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        .scan-line { position: absolute; top: 10%; left: 5%; width: 90%; height: 2px; background: var(--primary); box-shadow: 0 0 15px 2px var(--primary); animation: scan 2.5s infinite alternate ease-in-out; z-index: 6; display: none; }
        @keyframes scan { 0% { top: 10%; opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { top: 90%; opacity: 0; } }

        .camera-off-state { position: absolute; display: flex; flex-direction: column; align-items: center; color: #64748b; }
        .camera-off-state svg { width: 64px; height: 64px; margin-bottom: 15px; opacity: 0.5; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;}

        .control-panel { margin-top: 35px; display: flex; gap: 20px; z-index: 10; }
        .btn-control { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 15px 30px; border-radius: 16px; font-family: inherit; font-size: 1.1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.3s ease; }
        .btn-control:hover { background: rgba(124, 179, 66, 0.1); border-color: var(--primary); }

        /* شاشة التأكيد مع الرسالة المخصصة */
        .modal-overlay { position: fixed; inset: 0; background: rgba(11, 19, 32, 0.9); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 100; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.show { opacity: 1; }
        
        .result-card { background: var(--bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px; width: 90%; max-width: 450px; text-align: center; transform: translateY(30px) scale(0.95); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); }
        .modal-overlay.show .result-card { transform: translateY(0) scale(1); }

        .result-icon { width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; font-size: 3rem; background: rgba(255,255,255,0.05); border: 3px solid transparent; }
        
        .result-status { font-size: 1.1rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 5px; }
        .result-name { font-size: 2.2rem; font-weight: 900; color: white; margin: 0 0 15px 0; }
        
        /* الرسالة الترحيبية المميزة (مصححة لغوياً) */
        .welcome-msg { font-size: 1.2rem; color: #cbd5e1; line-height: 1.6; margin-bottom: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }

        .result-time { background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 12px; font-size: 1rem; color: #94a3b8; display: inline-block; }

        .footer-branding { position: fixed; bottom: 15px; width: 100%; text-align: center; z-index: 10; }
        .footer-branding p { margin: 0; font-size: 0.95rem; color: #64748b; font-weight: 500;}
        .footer-branding span { font-weight: 900; }
        .team-name { color: var(--primary); }
        .leader-name { color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1>SHIELD DZ</h1>
        <p>The Future Begins with Health</p>
    </div>

    <div class="scanner-container">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        
        <div class="camera-off-state" id="cameraOffMsg">
            <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <span>النظام في وضع الاستعداد</span>
        </div>

        <div id="reader"></div>
        <div class="scan-line" id="laserLine"></div>
    </div>

    <div class="control-panel">
        <button class="btn-control" id="btnToggle" onclick="toggleScanner()">
            <span id="toggleIcon">▶️</span> <span id="toggleText">تشغيل الماسح</span>
        </button>
        <button class="btn-control" onclick="switchCamera()">
            <span>🔄</span> تبديل الكاميرا
        </button>
    </div>

    <div class="modal-overlay" id="resultModal">
        <div class="result-card" id="resultCard">
            <div class="result-icon" id="resIcon"></div>
            <div class="result-status" id="resStatus">STATUS</div>
            <h2 class="result-name" id="resName">اسم الضيف</h2>
            <div class="welcome-msg" id="resMsg">نشكرك على تلبية دعوة انطلاق مشروعنا، ونتمنى لك أجواءً مميزة.</div>
            <div class="result-time" id="resTime">00:00</div>
        </div>
    </div>

    <div class="footer-branding">
        <p>تم التطوير والبرمجة بواسطة <span class="team-name">فريق طموح</span></p>
        <p>بالتعاون مع <span class="leader-name">قائدة المشروع</span></p>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCgZgpQHl1aJcbtIe8otscDfA_Plzl7n_c", authDomain: "test-b8f87.firebaseapp.com", databaseURL: "https://test-b8f87-default-rtdb.firebaseio.com", projectId: "test-b8f87", storageBucket: "test-b8f87.firebasestorage.app", messagingSenderId: "199270761575", appId: "1:199270761575:web:fdb307007a678a498680c2" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let html5QrCode; let isScanning = false; let isProcessing = false; let currentFacingMode = "environment";

        function initScanner() { if(!html5QrCode) html5QrCode = new Html5Qrcode("reader"); }

        async function toggleScanner() {
            if(isProcessing) return;
            initScanner();
            const btn = document.getElementById('btnToggle'); const icon = document.getElementById('toggleIcon'); const text = document.getElementById('toggleText');

            if (isScanning) {
                await html5QrCode.stop();
                isScanning = false; setUIState('off');
                icon.innerText = "▶️"; text.innerText = "تشغيل الماسح";
                btn.style.borderColor = "rgba(255,255,255,0.1)"; btn.style.color = "white";
            } else {
                try {
                    setUIState('loading');
                    await html5QrCode.start({ facingMode: currentFacingMode }, { fps: 15, qrbox: { width: 250, height: 250 } }, handleScan);
                    scanStarted(btn, icon, text);
                } catch(err) {
                    try {
                        await html5QrCode.start({ facingMode: "user" }, { fps: 15, qrbox: { width: 250, height: 250 } }, handleScan);
                        currentFacingMode = "user"; scanStarted(btn, icon, text);
                    } catch(e) { alert("تأكد من صلاحيات الكاميرا"); setUIState('off'); }
                }
            }
        }

        function scanStarted(btn, icon, text) {
            isScanning = true; setUIState('on');
            icon.innerText = "⏹️"; text.innerText = "إيقاف الماسح";
            btn.style.borderColor = "#ef4444"; btn.style.color = "#fca5a5";
        }

        async function switchCamera() {
            if (!isScanning || isProcessing) return;
            isProcessing = true; await html5QrCode.stop();
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            try { await html5QrCode.start({ facingMode: currentFacingMode }, { fps: 15, qrbox: 250 }, handleScan); } 
            catch(e) { 
                currentFacingMode = "environment"; 
                await html5QrCode.start({ facingMode: currentFacingMode }, { fps: 15, qrbox: 250 }, handleScan); 
            }
            isProcessing = false;
        }

        function setUIState(state) {
            const msg = document.getElementById('cameraOffMsg'); const laser = document.getElementById('laserLine'); const corners = document.querySelectorAll('.corner');
            if (state === 'on') { msg.style.display = 'none'; laser.style.display = 'block'; corners.forEach(c => c.style.borderColor = 'var(--primary)'); } 
            else if (state === 'off') { msg.style.display = 'flex'; laser.style.display = 'none'; corners.forEach(c => c.style.borderColor = '#475569'); }
        }

        function handleScan(decodedText) {
            if(isProcessing) return;
            isProcessing = true;
            html5QrCode.pause(); document.getElementById('laserLine').style.display = "none";

            db.ref('shield_guests/' + decodedText).once('value').then(snap => {
                if(snap.exists()){
                    const user = snap.val();
                    if(user.attended) {
                        showResult("⚠️", "مسجل مسبقاً", user.name, "var(--warning)", "لقد قمت بتسجيل دخولك بالفعل.");
                    } else {
                        const timeNow = new Date().toLocaleTimeString('ar-DZ', {hour: '2-digit', minute:'2-digit'});
                        db.ref('shield_guests/' + decodedText).update({ attended: true, scanTime: timeNow });
                        // تعديل النص هنا أيضا ليطابق النص المصحح
                        showResult("✓", "دخول مصرح به", user.name, "var(--primary)", "نشكرك على تلبية دعوة انطلاق مشروعنا، ونتمنى لك أجواءً مميزة.");
                    }
                } else {
                    showResult("✕", "تصريح غير صالح", "غير مسجل", "var(--danger)", "عذراً، هذه البطاقة غير معترف بها في النظام.");
                }
            });
        }

        function showResult(icon, status, name, color, message) {
            const modal = document.getElementById('resultModal'); const card = document.getElementById('resultCard'); const iconEl = document.getElementById('resIcon');
            
            iconEl.innerText = icon; iconEl.style.color = color; iconEl.style.borderColor = color; iconEl.style.boxShadow = `0 0 20px ${color}40`;
            document.getElementById('resStatus').innerText = status; document.getElementById('resStatus').style.color = color;
            document.getElementById('resName').innerText = name;
            document.getElementById('resMsg').innerText = message; 
            
            const now = new Date(); document.getElementById('resTime').innerText = 'التوقيت: ' + now.toLocaleTimeString('ar-DZ', {hour: '2-digit', minute:'2-digit'});
            card.style.borderTop = `4px solid ${color}`; modal.style.display = 'flex';
            
            setTimeout(() => modal.classList.add('show'), 10);
            
            setTimeout(() => { 
                modal.classList.remove('show');
                setTimeout(() => { 
                    modal.style.display = 'none'; isProcessing = false;
                    if(isScanning) { html5QrCode.resume(); document.getElementById('laserLine').style.display = "block"; }
                }, 300); 
            }, 4000);
        }
    </script>
</body>
</html>
